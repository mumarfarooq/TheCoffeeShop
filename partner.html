<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Nida's Coffee Shop</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
       <header>
        <img src="clogo.jpg" alt="Logo" class="header-logo">
        <h1>Nida's Coffee Shop</h1>
       </header>
       <nav>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#menu">Menu</a></li>
            <li><a href="#stores">Our Locations</a></li>
        </ul>
       </nav>
      <main>
        <section>
            <div class="regform">
                <h3>Registration Form</h3>
                <form action="">
                    <label for="fname">First Name</label><br>
                    <input type="text" id="fname" placeholder="Umar"><br>
                    <label for="lname">Last Name</label><br>
                    <input type="text" id="lname" placeholder="Farooq"><br>
                    <label for="phone">Phone Number</label><br>
                    <input type="number" id="phone" placeholder="03319576125" pattern="{0}{3}[0-4][0-4][0-9][0-9][0-9][0-9][0-9][0-9][0-9]"><br>
                     <label for="email">Email</label><br>
                    <input type="email" id="email" placeholder="abc@abc.com"><br><br>
                    <input type="button" value="Enquire Now" id="submit">
                </form>
            </div>
        </section>
      </main>
       <footer>
        <h6>Contact US | thecoffeeshop@gmail.com</h6>
       </footer>
        
        <script src="" async defer></script>
    </body>
</html>
